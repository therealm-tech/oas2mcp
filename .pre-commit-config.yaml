---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # Helm templates are Go-templated, not plain YAML.
        exclude: ^charts/.*/templates/
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key
        # A throwaway RSA key used only by the auth unit tests, never a real
        # credential. Scoped to this one fixture so the hook stays armed
        # everywhere else.
        exclude: ^tests/fixtures/test_rsa_key\.pem$

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        types:
          - rust
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets -- -D warnings
        language: system
        types:
          - rust
        pass_filenames: false

      - id: actionlint
        name: actionlint
        entry: actionlint
        language: system
        types:
          - yaml
        files: ^\.github/workflows/

      - id: helm-lint
        name: helm lint
        entry: helm lint charts/oas2mcp -f charts/oas2mcp/values-lint.yaml
        language: system
        files: ^charts/oas2mcp/
        pass_filenames: false

      - id: helm-docs
        name: helm-docs
        entry: helm-docs --chart-search-root=charts
        language: system
        files: ^charts/.*/(values\.yaml|Chart\.yaml|README\.md(\.gotmpl)?)$
        pass_filenames: false

  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      # `language: system` — needs the `hadolint` binary on PATH (installed in CI).
      - id: hadolint
        args:
          - --no-color
