# -- oas2mcp server: deploys the OpenAPIâ†’MCP proxy as an HTTP MCP endpoint.
oas2mcp:
  # -- Number of server replicas.
  replicaCount: 1

  image:
    # -- Container image repository.
    repository: ghcr.io/therealm-tech/oas2mcp
    # -- Image pull policy.
    pullPolicy: IfNotPresent
    # -- (string) Image tag. Unset â†’ the chart `appVersion`.
    tag: ~

  # -- (list) Image pull secrets for private registries.
  imagePullSecrets: []

  openapi:
    # -- (string) URL of the OpenAPI document fetched at startup. Mutually exclusive with `inline`.
    url: ~
    # -- (string) Inline OpenAPI document (JSON or YAML). Stored in a ConfigMap and mounted; takes precedence over `url`.
    inline: ~
    # -- (list) `Name: Value` headers sent when fetching `url` (e.g. for a private document). Stored in a Secret. Ignored with `inline`.
    headers: []
    existingSecret:
      # -- (string) Name of a pre-existing Secret holding the document-fetch headers. Set â†’ takes precedence over `headers`.
      name: ~
      # -- Key in that Secret holding the newline-separated `Name: Value` headers.
      key: OPENAPI_HEADERS
    # -- (string) Re-fetch `url` on this interval and rebuild the tool set (e.g. `30s`, `5m`, `1h`). Unset â†’ load once at startup. Ignored with `inline`.
    reloadEvery: ~
    oauth:
      # -- (string) OAuth2 `client_credentials` token endpoint. Set â†’ the document fetch authenticates with an auto-refreshed bearer token (best paired with `reloadEvery`). Ignored with `inline`.
      tokenUrl: ~
      # -- (string) OAuth2 client ID.
      clientId: ~
      # -- (string) OAuth2 client secret. Stored in a Secret. Ignored when `existingSecret.name` is set.
      clientSecret: ~
      existingSecret:
        # -- (string) Name of a pre-existing Secret holding the client secret. Set â†’ takes precedence over `clientSecret`.
        name: ~
        # -- Key in that Secret holding the client secret.
        key: OPENAPI_OAUTH_CLIENT_SECRET
      # -- (list) OAuth2 scopes requested for the token.
      scopes: []
      # -- (string) OAuth2 `audience` parameter, when the provider requires it (e.g. Auth0).
      audience: ~

  # -- Filter which OpenAPI operations are exposed as tools. An operation is kept if it matches any `include`/`includeRegex`/`includeTags` allowlist (or all allowlists are empty), then dropped if it matches any `exclude`/`excludeRegex`/`excludeTags`. Use it to cut a large API down to a usable tool set.
  operations:
    # -- (list) Glob allowlist on the operation name (operationId, or `<method>_<path>`); `*` and `?` supported. Maps to `INCLUDE_OPERATIONS`.
    include: []
    # -- (list) Glob denylist on the operation name; takes precedence over the allowlist. Maps to `EXCLUDE_OPERATIONS`.
    exclude: []
    # -- (list) Regex allowlist on the operation name (e.g. `^(get|post)ApiV4Projects`). Maps to `INCLUDE_OPERATIONS_REGEX`.
    includeRegex: []
    # -- (list) Regex denylist on the operation name; takes precedence over the allowlist. Maps to `EXCLUDE_OPERATIONS_REGEX`.
    excludeRegex: []
    # -- (list) Only expose operations carrying one of these OpenAPI tags (case-insensitive). Maps to `INCLUDE_TAGS`.
    includeTags: []
    # -- (list) Drop operations carrying one of these OpenAPI tags (case-insensitive); takes precedence over the allowlist. Maps to `EXCLUDE_TAGS`.
    excludeTags: []

  # -- Restrict the tool set per caller by matching the roles in their verified JWT against tool-name regexes. Requires `transport: streamable-http` (the only transport exposing the client's JWT). A caller with no valid token, or whose roles match nothing, sees and can call no tools.
  auth:
    # -- (list) Roleâ†’tool mappings as `role:tool_name_regex` (e.g. `admin:.*`, `reader:^get`). A tool is visible if any of the caller's roles maps to a regex matching the tool name. Set â†’ enables JWT verification, which requires `jwks.url` or `jwks.file`. Maps to `OAUTH_ROLE_MAPPER`.
    roleMapper: []
    # -- (string) JWT claim listing the caller's roles (an array or a whitespace-separated string). Unset â†’ the binary default (`roles`). Maps to `OAUTH_ROLE_CLAIM`.
    roleClaim: ~
    # -- (list) JWT claim names copied into the per-call tracing log as a `jwt.claims` field (e.g. `sub`, `email`, `tenant_id`), for observability. Logged only, never a metric label. Needs `roleMapper` (claims come from the verified JWT). Defaults to `[sub]`; set `[]` to disable. Maps to `TRACE_CLAIMS`.
    traceClaims:
      - sub
    jwks:
      # -- (string) URL of a JWKS document, fetched at startup, whose keys verify incoming JWT signatures. Mutually exclusive with `file`. One of the two is required when `roleMapper` is set. Maps to `OAUTH_JWKS_URL`.
      url: ~
      # -- (string) Path to a JWKS document on disk (mount it via `extraVolumes`/`extraVolumeMounts`). Mutually exclusive with `url`. Maps to `OAUTH_JWKS_FILE`.
      file: ~

  # -- Extra CA certificates to trust for every outbound TLS connection (upstream API, document fetch, OAuth token endpoint, JWKS). Added on top of the built-in public roots â€” supply only your private/corporate CA. Mounted as a file and pointed at via `CA_CERT_FILE`.
  caCerts:
    # -- (string) Inline PEM bundle of one or more CA certificates. Stored in a Secret and mounted. Ignored when `existing.name` is set.
    inline: ~
    # -- Mount the PEM bundle from a resource you already manage, instead of `inline`. Takes precedence over `inline` when `name` is set.
    existing:
      # -- (string) Kind of the resource holding the bundle: `ConfigMap` (the natural home for public CA certs) or `Secret`.
      kind: ConfigMap
      # -- (string) Name of the resource. Set â†’ mounts the bundle from it instead of generating a Secret from `inline`.
      name: ~
      # -- Key in the resource holding the PEM bundle (also the mounted file name).
      key: ca-certificates.crt

  # -- (string) Upstream API base URL the tool calls are proxied to. Unset â†’ taken from the document `servers`.
  baseUrl: ~

  # -- MCP transport to expose. One of `streamable-http`, `sse`. (`stdio` makes no sense for a long-running Deployment.)
  transport: streamable-http

  upstream:
    # -- (list) Static `Name: Value` headers added to every upstream request (e.g. `Authorization: Bearer ...`). Stored in a Secret.
    headers: []
    existingSecret:
      # -- (string) Name of a pre-existing Secret holding the upstream headers. Set â†’ takes precedence over `headers`.
      name: ~
      # -- Key in that Secret holding the newline-separated `Name: Value` headers.
      key: UPSTREAM_HEADERS
    # -- (list) Names of incoming MCP-client request headers forwarded verbatim to the upstream API (e.g. `Authorization`). Per-call, not static; requires `transport: streamable-http`.
    forwardHeaders: []

  # -- `tracing` filter directive, mapped to `RUST_LOG`.
  logFilter: info

  service:
    # -- Service type.
    type: ClusterIP
    # -- Service port (also the container listen port).
    port: 8000

  # -- Tool-call metrics (OpenTelemetry). Export over OTLP and/or a Prometheus `/metrics` endpoint; both are independent.
  metrics:
    otlp:
      # -- (string) Base OTLP endpoint to push metrics to over HTTP (e.g. `http://otel-collector:4318`); `/v1/metrics` is appended. Unset â†’ no OTLP export. Maps to `OTEL_EXPORTER_OTLP_ENDPOINT`.
      endpoint: ~
    # -- (string) `service.name` reported on exported metrics. Unset â†’ the binary default (`oas2mcp`). Maps to `OTEL_SERVICE_NAME`.
    serviceName: ~
    prometheus:
      # -- Serve a Prometheus `/metrics` endpoint on a dedicated port and Service port. Required by the ServiceMonitor below.
      enabled: false
      # -- Port the Prometheus `/metrics` endpoint listens on (container and Service).
      port: 9090
      serviceMonitor:
        # -- Create a Prometheus Operator ServiceMonitor scraping `/metrics`. Requires `prometheus.enabled` and the `monitoring.coreos.com` CRD.
        enabled: false
        # -- (string) Scrape interval (e.g. `30s`). Unset â†’ the Prometheus default.
        interval: ~
        # -- (string) Per-scrape timeout (e.g. `10s`). Unset â†’ the Prometheus default.
        scrapeTimeout: ~
        # -- (object) Extra labels on the ServiceMonitor so your Prometheus instance selects it (e.g. `release: kube-prometheus-stack`).
        labels: {}
        # -- (list) Prometheus `relabelings` applied to scraped targets before ingestion.
        relabelings: []
        # -- (list) Prometheus `metricRelabelings` applied to scraped samples before ingestion.
        metricRelabelings: []

  ingress:
    # -- Create an Ingress for the HTTP transport.
    enabled: false
    # -- (string) Ingress class name.
    className: ~
    # -- (object) Ingress annotations.
    annotations: {}
    # -- Host the Ingress routes from.
    host: oas2mcp.example.com
    # -- (string) Name of a TLS Secret for the host. Unset â†’ no TLS block.
    tlsSecret: ~

  serviceAccount:
    # -- Create a dedicated ServiceAccount for the server.
    create: true
    # -- (string) ServiceAccount name. Unset â†’ generated from the release name.
    name: ~
    # -- (object) Annotations added to the ServiceAccount.
    annotations: {}

  # -- (object) Annotations added to the pod.
  podAnnotations: {}
  # -- (object) Extra labels added to the pod.
  podLabels: {}

  # -- Pod-level security context (restricted Pod Security Standard).
  podSecurityContext:
    # -- Forbid running as root.
    runAsNonRoot: true
    # -- UID to run every container as.
    runAsUser: 1000
    # -- GID to run every container as.
    runAsGroup: 1000
    # -- Owning group for mounted volumes.
    fsGroup: 1000
    seccompProfile:
      # -- Seccomp profile applied to the pod.
      type: RuntimeDefault

  # -- Container-level security context (restricted Pod Security Standard).
  securityContext:
    # -- Disallow privilege escalation.
    allowPrivilegeEscalation: false
    # -- Mount the root filesystem read-only.
    readOnlyRootFilesystem: true
    capabilities:
      # -- Linux capabilities dropped from the container.
      drop:
        - ALL

  # -- Compute resources. CPU has a request but no limit (compressible); memory and ephemeral storage are capped.
  resources:
    requests:
      # -- CPU request.
      cpu: 50m
      # -- Memory request.
      memory: 64Mi
      # -- Ephemeral storage request.
      ephemeral-storage: 64Mi
    limits:
      # -- Memory limit.
      memory: 128Mi
      # -- Ephemeral storage limit.
      ephemeral-storage: 256Mi

  # -- (object) Node selector for pod scheduling.
  nodeSelector: {}
  # -- (list) Tolerations for pod scheduling.
  tolerations: []
  # -- (object) Affinity rules for pod scheduling.
  affinity: {}

  # -- Extra environment variables injected into the container.
  extraEnv: []
  # -- Extra volumes added to the pod.
  extraVolumes: []
  # -- Extra volume mounts added to the container.
  extraVolumeMounts: []
