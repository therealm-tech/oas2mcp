{{- if and (not .Values.oas2mcp.openapi.url) (not .Values.oas2mcp.openapi.inline) }}
{{- fail "oas2mcp.openapi.url or oas2mcp.openapi.inline must be set" }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "oas2mcp.fullname" . }}
  labels:
    {{- include "oas2mcp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.oas2mcp.replicaCount }}
  selector:
    matchLabels:
      {{- include "oas2mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "oas2mcp.selectorLabels" . | nindent 8 }}
        {{- with .Values.oas2mcp.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- if .Values.oas2mcp.openapi.inline }}
        checksum/openapi: {{ .Values.oas2mcp.openapi.inline | sha256sum }}
        {{- end }}
        {{- if and (gt (len .Values.oas2mcp.upstream.headers) 0) (not .Values.oas2mcp.upstream.existingSecret.name) }}
        checksum/upstream: {{ join "\n" .Values.oas2mcp.upstream.headers | sha256sum }}
        {{- end }}
        {{- if and (not .Values.oas2mcp.openapi.inline) (gt (len .Values.oas2mcp.openapi.headers) 0) (not .Values.oas2mcp.openapi.existingSecret.name) }}
        checksum/openapi-headers: {{ join "\n" .Values.oas2mcp.openapi.headers | sha256sum }}
        {{- end }}
        {{- if and (not .Values.oas2mcp.openapi.inline) .Values.oas2mcp.openapi.oauth.clientSecret (not .Values.oas2mcp.openapi.oauth.existingSecret.name) }}
        checksum/openapi-oauth: {{ .Values.oas2mcp.openapi.oauth.clientSecret | sha256sum }}
        {{- end }}
        {{- with .Values.oas2mcp.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.oas2mcp.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "oas2mcp.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.oas2mcp.podSecurityContext | nindent 8 }}
      containers:
        - name: oas2mcp
          image: {{ include "oas2mcp.image" . | quote }}
          imagePullPolicy: {{ .Values.oas2mcp.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.oas2mcp.securityContext | nindent 12 }}
          args:
            - --transport
            - {{ .Values.oas2mcp.transport | quote }}
          env:
            - name: BIND_ADDR
              value: "0.0.0.0:{{ .Values.oas2mcp.service.port }}"
            - name: RUST_LOG
              value: {{ .Values.oas2mcp.logFilter | quote }}
            {{- if .Values.oas2mcp.openapi.inline }}
            - name: OPENAPI_FILE
              value: /etc/oas2mcp/openapi.yaml
            {{- else }}
            - name: OPENAPI_URL
              value: {{ .Values.oas2mcp.openapi.url | quote }}
            {{- if or .Values.oas2mcp.openapi.existingSecret.name (gt (len .Values.oas2mcp.openapi.headers) 0) }}
            - name: OPENAPI_HEADERS
              valueFrom:
                secretKeyRef:
                  name: {{ include "oas2mcp.openapiSecretName" . }}
                  key: {{ include "oas2mcp.openapiSecretKey" . }}
            {{- end }}
            {{- with .Values.oas2mcp.openapi.oauth.tokenUrl }}
            - name: OPENAPI_OAUTH_TOKEN_URL
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.oas2mcp.openapi.oauth.clientId }}
            - name: OPENAPI_OAUTH_CLIENT_ID
              value: {{ . | quote }}
            {{- end }}
            {{- if or .Values.oas2mcp.openapi.oauth.existingSecret.name .Values.oas2mcp.openapi.oauth.clientSecret }}
            - name: OPENAPI_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "oas2mcp.oauthSecretName" . }}
                  key: {{ include "oas2mcp.oauthSecretKey" . }}
            {{- end }}
            {{- with .Values.oas2mcp.openapi.oauth.scopes }}
            - name: OPENAPI_OAUTH_SCOPES
              value: {{ join "\n" . | quote }}
            {{- end }}
            {{- with .Values.oas2mcp.openapi.oauth.audience }}
            - name: OPENAPI_OAUTH_AUDIENCE
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.oas2mcp.openapi.reloadEvery }}
            - name: RELOAD_EVERY
              value: {{ . | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.oas2mcp.baseUrl }}
            - name: BASE_URL
              value: {{ . | quote }}
            {{- end }}
            {{- if or .Values.oas2mcp.upstream.existingSecret.name (gt (len .Values.oas2mcp.upstream.headers) 0) }}
            - name: UPSTREAM_HEADERS
              valueFrom:
                secretKeyRef:
                  name: {{ include "oas2mcp.upstreamSecretName" . }}
                  key: {{ include "oas2mcp.upstreamSecretKey" . }}
            {{- end }}
            {{- with .Values.oas2mcp.upstream.forwardHeaders }}
            - name: FORWARD_HEADERS
              value: {{ join "\n" . | quote }}
            {{- end }}
            {{- with .Values.oas2mcp.metrics.otlp.endpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.oas2mcp.metrics.serviceName }}
            - name: OTEL_SERVICE_NAME
              value: {{ . | quote }}
            {{- end }}
            {{- if .Values.oas2mcp.metrics.prometheus.enabled }}
            - name: METRICS_ADDR
              value: "0.0.0.0:{{ .Values.oas2mcp.metrics.prometheus.port }}"
            {{- end }}
            {{- with .Values.oas2mcp.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.oas2mcp.service.port }}
              protocol: TCP
            {{- if .Values.oas2mcp.metrics.prometheus.enabled }}
            - name: metrics
              containerPort: {{ .Values.oas2mcp.metrics.prometheus.port }}
              protocol: TCP
            {{- end }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.oas2mcp.resources | nindent 12 }}
          {{- if or .Values.oas2mcp.openapi.inline .Values.oas2mcp.extraVolumeMounts }}
          volumeMounts:
            {{- if .Values.oas2mcp.openapi.inline }}
            - name: openapi
              mountPath: /etc/oas2mcp
              readOnly: true
            {{- end }}
            {{- with .Values.oas2mcp.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- if or .Values.oas2mcp.openapi.inline .Values.oas2mcp.extraVolumes }}
      volumes:
        {{- if .Values.oas2mcp.openapi.inline }}
        - name: openapi
          configMap:
            name: {{ include "oas2mcp.fullname" . }}-openapi
        {{- end }}
        {{- with .Values.oas2mcp.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.oas2mcp.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.oas2mcp.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.oas2mcp.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
