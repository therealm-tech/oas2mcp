{{- if .Values.oas2mcp.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "oas2mcp.serviceAccountName" . }}
  labels:
    {{- include "oas2mcp.labels" . | nindent 4 }}
  {{- with .Values.oas2mcp.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
