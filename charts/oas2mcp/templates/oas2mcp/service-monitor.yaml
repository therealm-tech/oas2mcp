{{- if .Values.oas2mcp.metrics.prometheus.serviceMonitor.enabled }}
{{- if not .Values.oas2mcp.metrics.prometheus.enabled }}
{{- fail "oas2mcp.metrics.prometheus.enabled must be true to create a ServiceMonitor (it scrapes the /metrics endpoint)" }}
{{- end }}
{{- $sm := .Values.oas2mcp.metrics.prometheus.serviceMonitor }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "oas2mcp.fullname" . }}
  labels:
    {{- include "oas2mcp.labels" . | nindent 4 }}
    {{- with $sm.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "oas2mcp.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: metrics
      path: /metrics
      {{- with $sm.interval }}
      interval: {{ . | quote }}
      {{- end }}
      {{- with $sm.scrapeTimeout }}
      scrapeTimeout: {{ . | quote }}
      {{- end }}
      {{- with $sm.relabelings }}
      relabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $sm.metricRelabelings }}
      metricRelabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
