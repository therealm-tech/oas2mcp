{{- if and (gt (len .Values.oas2mcp.upstream.headers) 0) (not .Values.oas2mcp.upstream.existingSecret.name) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "oas2mcp.upstreamSecretName" . }}
  labels:
    {{- include "oas2mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Newline-separated `Name: Value` headers, matching the UPSTREAM_HEADERS contract.
  UPSTREAM_HEADERS: {{ join "\n" .Values.oas2mcp.upstream.headers | quote }}
{{- end }}
{{- if and (not .Values.oas2mcp.openapi.inline) (gt (len .Values.oas2mcp.openapi.headers) 0) (not .Values.oas2mcp.openapi.existingSecret.name) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "oas2mcp.openapiSecretName" . }}
  labels:
    {{- include "oas2mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Newline-separated `Name: Value` headers, matching the OPENAPI_HEADERS contract.
  OPENAPI_HEADERS: {{ join "\n" .Values.oas2mcp.openapi.headers | quote }}
{{- end }}
{{- if and (not .Values.oas2mcp.openapi.inline) .Values.oas2mcp.openapi.oauth.clientSecret (not .Values.oas2mcp.openapi.oauth.existingSecret.name) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "oas2mcp.oauthSecretName" . }}
  labels:
    {{- include "oas2mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPENAPI_OAUTH_CLIENT_SECRET: {{ .Values.oas2mcp.openapi.oauth.clientSecret | quote }}
{{- end }}
