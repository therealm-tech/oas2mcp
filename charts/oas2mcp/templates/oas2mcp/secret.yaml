{{- if and (gt (len .Values.oas2mcp.upstream.headers) 0) (not .Values.oas2mcp.upstream.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "oas2mcp.upstreamSecretName" . }}
  labels:
    {{- include "oas2mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Newline-separated `Name: Value` headers, matching the UPSTREAM_HEADERS contract.
  UPSTREAM_HEADERS: {{ join "\n" .Values.oas2mcp.upstream.headers | quote }}
{{- end }}
