name: quality

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-24.04
    steps:
      - name: check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: install the Rust toolchain
        run: rustup component add rustfmt clippy

      - name: cache cargo build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.13"

      - name: set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310  # v5.0.1

      - name: install helm-docs
        env:
          HELM_DOCS_VERSION: "1.14.2"
        run: |
          curl -fsSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin helm-docs

      - name: install actionlint
        env:
          ACTIONLINT_VERSION: "1.7.12"
        run: |
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin actionlint

      - name: install hadolint
        env:
          HADOLINT_VERSION: "2.12.0"
        run: |
          sudo curl -fsSL -o /usr/local/bin/hadolint \
            "https://github.com/hadolint/hadolint/releases/download/v${HADOLINT_VERSION}/hadolint-Linux-x86_64"
          sudo chmod +x /usr/local/bin/hadolint

      - name: install pre-commit
        run: pipx install pre-commit

      - name: run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  test:
    name: test
    runs-on: ubuntu-24.04
    steps:
      - name: check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: install the Rust toolchain
        run: rustup component add clippy

      - name: cache cargo build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: run the test suite
        run: cargo test --all --locked

  trivy:
    name: trivy
    permissions:
      contents: read
      # Publishing the SARIF report to the Security tab.
      security-events: write
    runs-on: ubuntu-24.04
    env:
      # Trivy renders the chart itself, but only once it has the values the
      # templates require. Without this it logs a render error and scans no
      # chart at all — while still reporting success.
      TRIVY_HELM_VALUES: charts/oas2mcp/values-lint.yaml
    steps:
      - name: check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Two passes on purpose. The Security tab gets everything actionable at
      # every severity; the build gate below only trips on HIGH/CRITICAL. One
      # pass cannot do both: `limit-severities-for-sarif` defaults to false, so
      # a SARIF run ignores `severity` and would fail the build on a LOW.
      - name: scan the repository
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # 0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          # Advisories without a released fix are noise nobody can action;
          # they would bury the dashboard under the base image's backlog.
          ignore-unfixed: true
          # A throwaway RSA key used only by the auth unit tests, never a real
          # credential — `detect-private-key` skips it for the same reason.
          skip-files: tests/fixtures/test_rsa_key.pem
          format: sarif
          output: trivy-fs.sarif
          exit-code: "0"

      - name: publish the findings
        # Only a fork or Dependabot pull request lacks the token to upload, and
        # both arrive as `pull_request`. Reporting happens from push events.
        if: ${{ github.event_name != 'pull_request' }}
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81  # v4.37.3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: fail on high and critical findings
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # 0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          skip-files: tests/fixtures/test_rsa_key.pem
          format: table
          exit-code: "1"
