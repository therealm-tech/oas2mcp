name: chart

on:
  push:
    tags:
      - "chart-*"
  workflow_dispatch:
    inputs:
      version:
        description: Chart version to publish (SemVer, no leading v).
        type: string
        required: true

permissions:
  contents: read

env:
  CHART_DIR: charts/oas2mcp
  OCI_REPO: oci://ghcr.io/therealm-tech/charts

jobs:
  publish:
    name: publish
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-24.04
    steps:
      - name: check out the repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310  # v5.0.1

      - name: resolve the chart version
        id: v
        # From the `chart-X.Y.Z` tag, or the workflow_dispatch input.
        run: |
          version="${{ inputs.version }}"
          if [ -z "$version" ]; then
            version="${GITHUB_REF_NAME#chart-}"
            version="${version#v}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: lint the chart
        run: helm lint "$CHART_DIR" -f "$CHART_DIR/values-lint.yaml"

      - name: log in to GHCR
        run: helm registry login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

      - name: package and push the chart
        env:
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          # appVersion stays as declared in Chart.yaml (the app image the chart targets);
          # the tag only sets the chart package version.
          helm package "$CHART_DIR" --version "$VERSION"
          helm push "oas2mcp-${VERSION}.tgz" "$OCI_REPO"
