name: build

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/build.yaml"
  pull_request:
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/build.yaml"
  workflow_dispatch:
    inputs:
      push:
        description: Push the image to the registry.
        type: boolean
        default: false
      version:
        description: Image tag to publish (defaults to the short commit SHA).
        type: string
        default: ""
  workflow_call:
    inputs:
      push:
        type: boolean
        default: false
      version:
        type: string
        default: ""

permissions:
  contents: read

env:
  IMAGE: ghcr.io/therealm-tech/oas2mcp

jobs:
  build:
    name: build (${{ matrix.arch }})
    permissions:
      contents: read
      packages: write
      # Publishing the SARIF report to the Security tab.
      security-events: write
    runs-on: ${{ matrix.runner }}
    # One native runner per architecture — never QEMU-emulate a Rust build.
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: set up buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: compute image labels
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6.2.0
        with:
          images: ${{ env.IMAGE }}

      - name: log in to GHCR
        if: ${{ inputs.push }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build to a local tarball. Scan it, then push the very same bits — a
      # release must scan the artefact it publishes, and debian:bookworm-slim
      # is a mutable tag whose advisories move daily.
      - name: build the image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          # Per-arch Docker layer cache: the expensive thing to recompute.
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max
          outputs: type=docker,dest=/tmp/image.tar

      # Two passes: report every severity to the Security tab, gate on HIGH and
      # CRITICAL. One pass cannot do both — a SARIF run ignores `severity`, so it
      # would fail the build on a LOW finding.
      - name: scan the image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # 0.35.0
        with:
          input: /tmp/image.tar
          scanners: vuln,secret
          # debian:bookworm-slim ships ~20 HIGH/CRITICAL advisories with no
          # released fix; reporting those would drown the dashboard.
          ignore-unfixed: true
          format: sarif
          output: trivy-image.sarif
          exit-code: "0"

      - name: publish the image findings
        # Only a fork or Dependabot pull request lacks the token to upload, and
        # both arrive as `pull_request`. Reporting happens from push events.
        if: ${{ github.event_name != 'pull_request' }}
        uses: github/codeql-action/upload-sarif@4187e74d05793876e9989daffde9c3e66b4acd07  # v3.37.3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image-${{ matrix.arch }}

      - name: fail on high and critical findings
        # A finding fails this job, which blocks the `manifest` job below, so a
        # release pushes digests that no tag ever references.
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # 0.35.0
        with:
          input: /tmp/image.tar
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"

      # Push only when releasing. The layer cache from the build above makes
      # this a cache hit, so the pushed digest is the image just scanned.
      - name: push the image
        id: build
        if: ${{ inputs.push }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: export digest
        if: ${{ inputs.push }}
        run: |
          mkdir -p /tmp/digests
          digest='${{ steps.build.outputs.digest }}'
          touch "/tmp/digests/${digest#sha256:}"

      - name: upload digest
        if: ${{ inputs.push }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1
          if-no-files-found: error

  manifest:
    name: manifest
    if: ${{ inputs.push }}
    needs: build
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-24.04
    steps:
      - name: download the per-arch digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: set up buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: compute image tags
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6.2.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=raw,value=latest,enable=${{ inputs.version != '' }}
            type=sha,enable=${{ inputs.version == '' }}

      - name: log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: create and push the multi-arch manifest
        working-directory: /tmp/digests
        run: |
          # shellcheck disable=SC2046
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: inspect the manifest
        run: docker buildx imagetools inspect "${IMAGE}:${{ steps.meta.outputs.version }}"
