changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: 🚀 Features
      labels:
        - feature
    - title: 🐛 Bug Fixes
      labels:
        - fix
    - title: 🧰 Maintenance
      labels:
        - chore
        - dependencies
        - rust
    - title: Other Changes
      labels:
        - "*"
